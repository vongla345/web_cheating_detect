<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background-color: #0056b3;
            color: white;
            padding: 10px;
            width: 250px;
            display: flex;
            flex-direction: column;
            justify-content: normal;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 10px 0;
            display: block;
            transition: background-color 0.3s;
        }

        .sidebar a:hover {
            background-color: #003f7f;
            border-radius: 5px;
        }

        .sidebar a.active {
            background-color: #004a9f;
            border-radius: 5px;
        }

        .sidebar .footer {
            font-size: 12px;
            color: #bbb;
        }

        /* Main content */
        .main-content {
            flex-grow: 1;
            background-color: white;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 600px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .profile-header img {
            border-radius: 50%;
            width: 80px;
            height: 80px;
            object-fit: cover;
        }

        .profile-header .upload-btn {
            background-color: #004a9f;
            color: white;
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .profile-header .upload-btn:hover {
            background-color: #003f7f;
        }

        .profile-body {
            margin-top: 20px;
        }

        .profile-body label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        .profile-body input, .profile-body select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .update-btn {
            background-color: #0056b3;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .update-btn:hover {
            background-color: #003f7f;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Cài đặt tài khoản</h2>
        <a href="#" class="active">Chung</a>
        <a href="{% url 'test_list' %}">Danh sách bài kiểm tra</a>
        <a href="#">Đơn vị đo</a>
        <a href="#">Thống kê học tập</a>
        <a href="{% url 'logout' %}">Đăng xuất</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="profile-container">
            <div class="profile-header">
                <div>
                    <h3>{{ first_name}} {{ last_name }}</h3>
                    <p>Học sinh</p>
                </div>
                <img src="https://via.placeholder.com/80" alt="Profile Picture">
                <button class="upload-btn">Tải lên</button>
            </div>

            <div class="profile-body">
                <label for="username">Username</label>
                <input type="text" id="username" value= {{ username }}>

                <label for="email">Email</label>
                <input type="email" id="email" value={{ email }}>

                <label for="birthdate">Ngày sinh</label>
                <input type="date" id="birthdate" value={{ date_of_birth }}>

                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" value={{ phone }}>

                <label for="gender">Giới tính</label>
                <select id="gender" name="gender">
                    <option value="1" {% if gender == 1 %}selected{% endif %}>Nam</option>
                    <option value="0" {% if gender == 0 %}selected{% endif %}>Nữ</option>
                </select>

                <label for="school_info">Thông tin trường</label>
                <input type="text" id="school_info" value={{ school_name }}>

                <button class="update-btn">Cập nhật</button>
            </div>
        </div>
    </div>

</body>
</html>
