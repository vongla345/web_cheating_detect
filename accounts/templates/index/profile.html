{% extends "base.html" %}
{% block title %}Hồ sơ cá nhân{% endblock %}

{% block content %}
<div class="profile-container">
    <div class="profile-header">
        <div>
            <h3>{{ first_name }} {{ last_name }}</h3>
            {% if role_id == 1 %}
            <p>Học sinh</p>
            {% else %}
            <p>Giáo viên</p>
            {% endif %}
        </div>
        <img src="https://via.placeholder.com/80" alt="Profile Picture">
        <button class="upload-profile-btn">Tải lên</button>
    </div>

    <div class="profile-body">
        <label for="username">Username</label>
        <input type="text" id="username" value="{{ username }}">

        <label for="email">Email</label>
        <input type="email" id="email" value="{{ email }}">

        <label for="birthdate">Ngày sinh</label>
        <input type="date" id="birthdate" value="{{ date_of_birth }}">

        <label for="phone">Số điện thoại</label>
        <input type="text" id="phone" value="{{ phone }}">

        <label for="gender">Giới tính</label>
        <select id="gender" name="gender">
            <option value="1" {% if gender == 1 %}selected{% endif %}>Nam</option>
            <option value="0" {% if gender == 0 %}selected{% endif %}>Nữ</option>
        </select>

        <label for="school_info">Thông tin trường</label>
        <input type="text" id="school_info" value="{{ school_name }}">

        <button class="update-profile-btn">Cập nhật</button>
    </div>
</div>
{% endblock %}
