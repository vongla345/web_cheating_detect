{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title %}Trang Web{% endblock %}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #1c1c93;
        }

        .page-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background-color: #1c1c93;
            color: white;
            height: 100%;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            display: flex;
            overflow-x: hidden;
            flex-direction: column;
            transition: 0.3s ease;
            padding-left: 10px;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 10px;
            padding-top: 40px;
            color: white;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 8px;
            color: white; /* Slate gray for inactive text */
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            background-color: #f1f5f9; /* Light gray on hover */
            color: #1e40af;
        }

        .sidebar a.active {
            background-color: #e0e7ff; /* Light indigo background */
            color: #1e40af; /* Darker blue text */
        }

        .sidebar .footer {
            font-size: 12px;
            color: #bbb;
        }

        .sidebar a i {
            margin-right: 20px;
            width: 20px;
            height: 20px;
        }

        .sidebar .closebtn {
            position: absolute;
            right: 12px;
            top: 12px;
            font-size: 24px;
            padding: 8px;
            color: white;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .sidebar .closebtn:hover {
            color: #bbb;
        }

        /* Toggle button */
        .toggle-btn {
            position: fixed; /* Cố định nút mở ở góc */
            top: 10px;
            left: 10px;
            background-color: #0056b3;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            transition: background-color 0.3s ease;
        }

        .toggle-btn:hover {
            background-color: #003f7f;
        }

        /* Main content area */
        .main-content {
            width: 100%; /* Tùy chỉnh độ rộng nội dung */
            position: relative; /* Cho phép sử dụng các tùy chọn căn chỉnh khác */
            display: flex;
            justify-content: center;
            overflow: auto;
            flex: 1;
            background: white;
            margin: 12px;
            border-radius: 24px;
            padding: 40px;
        }

        @media screen and (max-height: 450px) {
            .sidebar {
                padding-top: 15px;
            }

            .sidebar a {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
<div class="page-container">
    <!-- Nút ẩn/hiện sidebar -->
    <button class="toggle-btn" id="open-btn" onclick="toggleNav()">☰</button>

    <div class="sidebar" id="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="toggleNav()">×</a>
        <h2>Cài đặt tài khoản</h2>
        <a href="{% url 'profile' %}" class="{% if request.path == '/accounts/profile/' %}active{% endif %}"
           onclick="saveSidebarState()">
            <i data-lucide="user"></i>
            Chung
        </a>
        <a href="{% url 'test_list' %}" class="{% if request.path == '/accounts/test/' %}active{% endif %}"
           onclick="saveSidebarState()">
            <i data-lucide="clipboard-list"></i>
            Danh sách bài kiểm tra
        </a>
        <!--
        <a href="#" onclick="saveSidebarState()">
            <i data-lucide="users"></i>
            Quản lí lớp học
        </a>
        <a href="#" onclick="saveSidebarState()">
            <i data-lucide="bar-chart-2"></i>
            Thống kê học tập
        </a>
                -->
        <a href="{% url 'logout' %}" onclick="saveSidebarState()">
            <i data-lucide="log-out"></i>
            Đăng xuất
        </a>

    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>

    <!-- Main Content -->
    <div class="main-content" id="main-content">
        {% block content %}
            <!-- Nội dung từng trang sẽ được hiển thị ở đây -->
        {% endblock %}
    </div>

</div>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const sidebar = document.getElementById("sidebar");
        const main = document.getElementById("main-content");
        const openBtn = document.getElementById("open-btn");
        const header = document.querySelector(".header");
        // Khôi phục trạng thái sidebar từ sessionStorage
        const sidebarState = sessionStorage.getItem("sidebarState");
        if (sidebarState === "open") {
            sidebar.style.width = "250px";
            sidebar.style.paddingLeft = "10px";
            sidebar.style.transition = "0s";
            main.style.transition = "0s";
            main.style.marginLeft = "262px";
            openBtn.style.display = "none";
        } else {
            sidebar.style.width = "0";
            sidebar.style.paddingLeft = "0";
            main.style.marginLeft = "12px";
            openBtn.style.display = "block";
        }
    });

    function toggleNav() {
        const sidebar = document.getElementById("sidebar");
        const main = document.getElementById("main-content");
        const openBtn = document.getElementById("open-btn");

        if (sidebar.style.width === "250px") {
            // Đóng sidebar
            sidebar.style.width = "0";
            sidebar.style.paddingLeft = "0";
            main.style.marginLeft = "12px";
            openBtn.style.display = "block";
            sessionStorage.setItem("sidebarState", "closed"); // Lưu trạng thái
        } else {
            // Mở sidebar
            sidebar.style.width = "250px";
            sidebar.style.paddingLeft = "10px";
            sidebar.style.transition = "0.3s ease"; // Hiệu ứng chuyển động
            main.style.transition = "margin-left 0.3s";
            main.style.marginLeft = "262px";
            openBtn.style.display = "none";
            sessionStorage.setItem("sidebarState", "open"); // Lưu trạng thái
        }
    }

    function saveSidebarState() {
        // Lưu trạng thái sidebar vào sessionStorage khi nhấn vào link
        sessionStorage.setItem("sidebarState", "open");
    }


</script>
</body>
</html>
