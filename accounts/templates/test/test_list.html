<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Tests</title>
    <style>
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .test-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            height: 100px;
            text-align: center;
            font-weight: bold;
            color: #333;
            text-decoration: none;  /* Xóa gạch chân */
        }

        .test-item:hover {
            background-color: #e0e0e0;  /* Thay đổi màu khi hover */
        }
    </style>
</head>
<body>
    <h2>Available Tests</h2>
    <div class="test-grid">
        {% for test in tests %}
            <a href="{% url 'test_detail' test.0 %}" class="test-item">
                {{ test.1 }} <!-- Hiển thị tên bài kiểm tra -->
            </a>
        {% endfor %}
    </div>
</body>
</html>
